name: Download and send only changed configs

on:
  #schedule:
  #  - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # Скачиваем все файлы
      - name: Download fresh files
        run: |
          mkdir -p new_files
          curl -s --parallel --parallel-max 5 -L \
            -o "new_files/WhiteListsRusMobile_MostHelpful.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt" \
            -o "new_files/WhiteListsRusMobile2.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt" \
            -o "new_files/WhiteCidrRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt" \
            -o "new_files/WhiteCidrRUChecked.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-checked.txt" \
            -o "new_files/WhiteSNIRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-SNI-RU-all.txt"

      # Контрольная сумма
      - name: Calculate new checksum
        id: hash
        run: |
          CHECKSUM=$(md5sum new_files/* | md5sum | cut -d' ' -f1)
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "$CHECKSUM" > new_checksum.txt

      # Старый хеш
      - name: Read old checksum
        id: old
        run: |
          OLD=$(cat last_checksum.txt 2>/dev/null || echo "")
          echo "checksum=$OLD" >> $GITHUB_OUTPUT

      # Сравниваем
      - name: Check for changes
        id: diff
        run: |
          if [ "${{ steps.hash.outputs.checksum }}" != "${{ steps.old.outputs.checksum }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # Выход если нет изменений
      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: exit 0

      # Блокировка
      - name: Check lock
        id: lock
        if: steps.diff.outputs.changed == 'true'
        run: |
          if [ -f "sending.lock" ] && [ $(($(date +%s) - $(cat sending.lock))) -lt 900 ]; then
            echo "locked=true" >> $GITHUB_OUTPUT
          else
            echo "locked=false" >> $GITHUB_OUTPUT
            rm -f sending.lock
          fi
      
      - name: Exit if locked
        if: steps.lock.outputs.locked == 'true'
        run: exit 0

      - name: Set lock
        if: steps.diff.outputs.changed == 'true'
        run: date +%s > sending.lock

      # === Удаляем старые сообщения в Telegram ===
      - name: Delete old Telegram messages
        if: steps.diff.outputs.changed == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          [ -f "message_ids.txt" ] && while read msg_id; do
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/deleteMessage" \
              -F "chat_id=${TG_CHAT_ID}" \
              -F "message_id=${msg_id}" > /dev/null 2>&1
          done < message_ids.txt
          rm -f message_ids.txt

      # === 1. ОТПРАВКА В TELEGRAM ===
      - name: Send to Telegram
        if: steps.diff.outputs.changed == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          rm -f message_ids.txt
          
          for filename in "WhiteListsRusMobile_MostHelpful.txt" "WhiteListsRusMobile2.txt" "WhiteCidrRUAll.txt" "WhiteCidrRUChecked.txt" "WhiteSNIRUAll.txt"; do
            filepath="new_files/$filename"
            [ ! -f "$filepath" ] && continue
            
            DATE_CLEAN=$(grep -E '^# Date/Time:' "$filepath" | head -1 | sed 's/^# Date\/Time: //; s/^[ \t]*//;s/[ \t]*$//')
            CAPTION="📅 Дата обновления: ${DATE_CLEAN:-$filename}"
            
            tail -n +7 "$filepath" > "/tmp/${filename}"
            RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${TG_CHAT_ID}" \
              -F "document=@/tmp/${filename}" \
              -F "caption=${CAPTION}")
            
            MSG_ID=$(echo "$RESPONSE" | grep -o '"message_id":[0-9]*' | head -1 | cut -d':' -f2)
            [ -n "$MSG_ID" ] && echo "$MSG_ID" >> message_ids.txt
            rm -f "/tmp/${filename}"
          done
          
          # Объединённый файл
          FIRST_FILE="new_files/WhiteListsRusMobile_MostHelpful.txt"
          DATE_CLEAN=$(grep -E '^# Date/Time:' "$FIRST_FILE" | head -1 | sed 's/^# Date\/Time: //; s/^[ \t]*//;s/[ \t]*$//')
          CAPTION_ALL="📅 Дата обновления: ${DATE_CLEAN} (Все конфиги в одном файле)"
          
          {
            for filename in "WhiteListsRusMobile_MostHelpful.txt" "WhiteListsRusMobile2.txt" "WhiteCidrRUAll.txt" "WhiteCidrRUChecked.txt" "WhiteSNIRUAll.txt"; do
              filepath="new_files/$filename"
              if [ -f "$filepath" ]; then
                tail -n +7 "$filepath"
              fi
            done
          } > "/tmp/ALL_CONFIGS.txt"
          
          RESPONSE_ALL=$(curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TG_CHAT_ID}" \
            -F "document=@/tmp/ALL_CONFIGS.txt" \
            -F "caption=${CAPTION_ALL}")
          
          MSG_ID_ALL=$(echo "$RESPONSE_ALL" | grep -o '"message_id":[0-9]*' | head -1 | cut -d':' -f2)
          [ -n "$MSG_ID_ALL" ] && echo "$MSG_ID_ALL" >> message_ids.txt
          rm -f "/tmp/ALL_CONFIGS.txt"

      # === 2. ОТПРАВКА В БЕСЕДУ ВК ===
      - name: Send to VK Chat
        if: steps.diff.outputs.changed == 'true'
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
          VK_CHAT_ID: ${{ secrets.VK_CHAT_ID }}
        run: |
          # 1. Рассчитываем peer_id
          if [ -z "$VK_CHAT_ID" ]; then
            echo "❌ Ошибка: VK_CHAT_ID не задан в секретах!"
            exit 1
          fi
          PEER_ID=$((2000000000 + VK_CHAT_ID))
          echo "✅ Peer_ID рассчитан: $PEER_ID"
          
          # 2. Отправляем каждый файл отдельно
          for filename in "WhiteListsRusMobile_MostHelpful.txt" "WhiteListsRusMobile2.txt" "WhiteCidrRUAll.txt" "WhiteCidrRUChecked.txt" "WhiteSNIRUAll.txt"; do
            filepath="new_files/$filename"
            [ ! -f "$filepath" ] && continue
            
            DATE_CLEAN=$(grep -E '^# Date/Time:' "$filepath" | head -1 | sed 's/^# Date\/Time: //; s/^[ \t]*//;s/[ \t]*$//')
            CAPTION="📅 Дата обновления: ${DATE_CLEAN:-$filename}"
            
            tail -n +7 "$filepath" > "/tmp/clean_${filename}"
            
            # 2.1 Получаем URL для загрузки
            echo "📤 Загружаем $filename..."
            UPLOAD_URL_RESP=$(curl -s -X POST "https://api.vk.com/method/docs.getUploadServer?group_id=${VK_GROUP_ID}&access_token=${VK_TOKEN}&v=5.131")
            
            if echo "$UPLOAD_URL_RESP" | grep -q '"error"'; then
              echo "❌ Ошибка API при получении upload_url: $UPLOAD_URL_RESP"
              continue
            fi
            
            UPLOAD_URL=$(echo "$UPLOAD_URL_RESP" | jq -r '.response.upload_url')
            if [ -z "$UPLOAD_URL" ] || [ "$UPLOAD_URL" == "null" ]; then
              echo "❌ Не удалось получить upload_url. Ответ: $UPLOAD_URL_RESP"
              continue
            fi
            
            # 2.2 Загружаем файл
            UPLOAD_RESPONSE=$(curl -s -F "file=@/tmp/clean_${filename}" "$UPLOAD_URL")
            
            # 2.3 Сохраняем документ
            SAVE_RESULT=$(curl -s -X POST "https://api.vk.com/method/docs.save" \
              -F "file=${UPLOAD_RESPONSE}" \
              -F "title=${filename}" \
              -F "access_token=${VK_TOKEN}" \
              -F "v=5.131")
            
            if echo "$SAVE_RESULT" | grep -q '"error"'; then
              echo "❌ Ошибка при сохранении документа: $SAVE_RESULT"
              continue
            fi
            
            DOC_OWNER_ID=$(echo "$SAVE_RESULT" | jq -r '.response.doc.owner_id')
            DOC_ID=$(echo "$SAVE_RESULT" | jq -r '.response.doc.id')
            ATTACHMENT="doc${DOC_OWNER_ID}_${DOC_ID}"
            
            # 2.4 Отправляем сообщение в беседу
            RANDOM_ID=$(shuf -i 1-2147483647 -n 1)
            SEND_RESULT=$(curl -s -X POST "https://api.vk.com/method/messages.send" \
              -F "peer_id=${PEER_ID}" \
              -F "random_id=${RANDOM_ID}" \
              -F "message=${CAPTION}" \
              -F "attachment=${ATTACHMENT}" \
              -F "access_token=${VK_TOKEN}" \
              -F "v=5.131")
            
            if echo "$SEND_RESULT" | grep -q '"error"'; then
              echo "❌ Ошибка при отправке сообщения: $SEND_RESULT"
            else
              echo "✅ Отправлен: $filename"
            fi
            
            rm -f "/tmp/clean_${filename}"
          done
          
          # 3. Отправляем объединённый файл
          echo "📦 Отправляем объединённый файл в беседу..."
          FIRST_FILE="new_files/WhiteListsRusMobile_MostHelpful.txt"
          DATE_CLEAN=$(grep -E '^# Date/Time:' "$FIRST_FILE" | head -1 | sed 's/^# Date\/Time: //; s/^[ \t]*//;s/[ \t]*$//')
          CAPTION_ALL="📅 Дата обновления: ${DATE_CLEAN} 📦 ВСЕ КОНФИГИ В ОДНОМ ФАЙЛЕ"
          
          {
            for filename in "WhiteListsRusMobile_MostHelpful.txt" "WhiteListsRusMobile2.txt" "WhiteCidrRUAll.txt" "WhiteCidrRUChecked.txt" "WhiteSNIRUAll.txt"; do
              filepath="new_files/$filename"
              if [ -f "$filepath" ]; then
                tail -n +7 "$filepath"
              fi
            done
          } > "/tmp/ALL_CONFIGS.txt"
          
          UPLOAD_URL_RESP_ALL=$(curl -s -X POST "https://api.vk.com/method/docs.getUploadServer?group_id=${VK_GROUP_ID}&access_token=${VK_TOKEN}&v=5.131")
          if echo "$UPLOAD_URL_RESP_ALL" | grep -q '"error"'; then
            echo "❌ Ошибка API: $UPLOAD_URL_RESP_ALL"
          else
            UPLOAD_URL_ALL=$(echo "$UPLOAD_URL_RESP_ALL" | jq -r '.response.upload_url')
            UPLOAD_RESPONSE_ALL=$(curl -s -F "file=@/tmp/ALL_CONFIGS.txt" "$UPLOAD_URL_ALL")
            SAVE_RESULT_ALL=$(curl -s -X POST "https://api.vk.com/method/docs.save" \
              -F "file=${UPLOAD_RESPONSE_ALL}" \
              -F "title=ALL_CONFIGS.txt" \
              -F "access_token=${VK_TOKEN}" \
              -F "v=5.131")
            
            if echo "$SAVE_RESULT_ALL" | grep -q '"error"'; then
              echo "❌ Ошибка при сохранении объединённого файла: $SAVE_RESULT_ALL"
            else
              DOC_OWNER_ID_ALL=$(echo "$SAVE_RESULT_ALL" | jq -r '.response.doc.owner_id')
              DOC_ID_ALL=$(echo "$SAVE_RESULT_ALL" | jq -r '.response.doc.id')
              ATTACHMENT_ALL="doc${DOC_OWNER_ID_ALL}_${DOC_ID_ALL}"
              RANDOM_ID_ALL=$(shuf -i 1-2147483647 -n 1)
              SEND_RESULT_ALL=$(curl -s -X POST "https://api.vk.com/method/messages.send" \
                -F "peer_id=${PEER_ID}" \
                -F "random_id=${RANDOM_ID_ALL}" \
                -F "message=${CAPTION_ALL}" \
                -F "attachment=${ATTACHMENT_ALL}" \
                -F "access_token=${VK_TOKEN}" \
                -F "v=5.131")
              
              if echo "$SEND_RESULT_ALL" | grep -q '"error"'; then
                echo "❌ Ошибка при отправке объединённого файла: $SEND_RESULT_ALL"
              else
                echo "✅ Отправлен объединённый файл"
              fi
            fi
          fi
          rm -f "/tmp/ALL_CONFIGS.txt"

      # Сохраняем состояние
      - name: Save state
        if: steps.diff.outputs.changed == 'true'
        run: |
          cp new_checksum.txt last_checksum.txt
          git config user.name "github-actions[bot]"
          git config.user.email "github-actions[bot]@users.noreply.github.com"
          git add last_checksum.txt
          [ -f "message_ids.txt" ] && git add message_ids.txt
          [ -f "sending.lock" ] && git add sending.lock
          git commit -m "Update state [skip ci]" || true
          git pull origin main --rebase --strategy-option=theirs || true
          git push
