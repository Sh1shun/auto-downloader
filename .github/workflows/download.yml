name: Download and send only changed configs

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # Скачиваем свежие файлы
      - name: Download fresh files
        run: |
          mkdir -p new_files
          curl -L -o "new_files/WhiteListsRusMobile_MostHelpful.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
          curl -L -o "new_files/WhiteListsRusMobile2.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
          curl -L -o "new_files/WhiteCidrRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt"
          curl -L -o "new_files/WhiteCidrRUChecked.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-checked.txt"
          curl -L -o "new_files/WhiteSNIRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-SNI-RU-all.txt"

      # Вычисляем хеш
      - name: Calculate new checksum
        id: hash
        run: |
          CHECKSUM=$(cat new_files/* 2>/dev/null | md5sum | cut -d' ' -f1)
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "$CHECKSUM" > new_checksum.txt

      # Читаем старый хеш
      - name: Read old checksum
        id: old
        run: |
          if [ -f "last_checksum.txt" ]; then
            OLD=$(cat last_checksum.txt)
            echo "checksum=$OLD" >> $GITHUB_OUTPUT
          else
            echo "checksum=" >> $GITHUB_OUTPUT
          fi

      # Сравниваем
      - name: Check for changes
        id: diff
        run: |
          if [ "${{ steps.hash.outputs.checksum }}" != "${{ steps.old.outputs.checksum }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # Если нет изменений — выходим
      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "Изменений нет, завершаем"

      # Блокировка
      - name: Check lock file
        id: lock
        if: steps.diff.outputs.changed == 'true'
        run: |
          if [ -f "sending.lock" ]; then
            LOCK_TIME=$(cat sending.lock)
            NOW=$(date +%s)
            if [ $((NOW - LOCK_TIME)) -lt 900 ]; then
              echo "locked=true" >> $GITHUB_OUTPUT
            else
              echo "locked=false" >> $GITHUB_OUTPUT
              rm -f sending.lock
            fi
          else
            echo "locked=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Exit if locked
        if: steps.lock.outputs.locked == 'true'
        run: exit 0

      - name: Set lock
        if: steps.diff.outputs.changed == 'true'
        run: date +%s > sending.lock

      # Удаляем старые сообщения
      - name: Delete old messages
        if: steps.diff.outputs.changed == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          if [ -f "message_ids.txt" ]; then
            while IFS= read -r msg_id; do
              curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/deleteMessage" \
                -F "chat_id=${TG_CHAT_ID}" \
                -F "message_id=${msg_id}" || true
            done < message_ids.txt
            rm -f message_ids.txt
          fi

      # Отправляем vless конфиги (простой текст, без jq)
      - name: Send vless configs
        if: steps.diff.outputs.changed == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          rm -f message_ids.txt
          
          for filepath in new_files/*; do
            filename=$(basename "$filepath" .txt)
            
            if grep -q '^vless://' "$filepath" 2>/dev/null; then
              # Собираем все строки vless:// в один блок
              VLESS_LINES=$(grep '^vless://' "$filepath" 2>/dev/null)
              
              if [ -n "$VLESS_LINES" ]; then
                # Формируем сообщение (простой текст, без HTML)
                MESSAGE="${filename}"$'\n\n'"${VLESS_LINES}"
                
                # Отправляем через POST с экранированием
                curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
                  -F "chat_id=${TG_CHAT_ID}" \
                  -F "text=${MESSAGE}" > /tmp/response.txt
                
                MSG_ID=$(grep -o '"message_id":[0-9]*' /tmp/response.txt | head -1 | cut -d':' -f2)
                if [ -n "$MSG_ID" ]; then
                  echo "$MSG_ID" >> message_ids.txt
                  echo "✅ Отправлен: $filename"
                else
                  echo "❌ Ошибка отправки $filename"
                  cat /tmp/response.txt
                fi
              fi
            else
              echo "⏸️ Нет vless в $filename"
            fi
          done
          
          if [ ! -f "message_ids.txt" ]; then
            touch message_ids.txt
          fi

      # Сохраняем состояние
      - name: Save state
        if: steps.diff.outputs.changed == 'true'
        run: |
          cp new_checksum.txt last_checksum.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add last_checksum.txt
          [ -f "message_ids.txt" ] && git add message_ids.txt
          [ -f "sending.lock" ] && git add sending.lock
          
          git commit -m "Update state [skip ci]" || echo "Nothing to commit"
          git pull origin main --rebase --strategy-option=theirs || true
          git push
