name: Download and send only changed configs

on:
  schedule:
    - cron: '*/10 * * * *'  # Поставлю 10 минут, чтобы не спамить, но ты можешь вернуть 5
  workflow_dispatch:

jobs:
  check-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # 1. Скачиваем свежие файлы
      - name: Download fresh files
        run: |
          mkdir -p new_files
          curl -L -o "new_files/WhiteListsRusMobile_MostHelpful.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
          curl -L -o "new_files/WhiteListsRusMobile2.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
          curl -L -o "new_files/WhiteCidrRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt"
          curl -L -o "new_files/WhiteCidrRUChecked.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-checked.txt"
          curl -L -o "new_files/WhiteSNIRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-SNI-RU-all.txt"

      # 2. Восстанавливаем старые файлы и ID сообщений из кэша (НЕ из репозитория)
      - name: Restore previous state
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            old_files
            message_ids.txt
          key: configs-cache-v9  # Фиксированный ключ, чтобы кэш был стабильным

      # 3. Сравниваем ПОСИМВОЛЬНО, а не по хешу. Это надёжнее.
      - name: Compare files
        id: diff
        run: |
          CHANGED="false"
          if [ -d "old_files" ]; then
            for file in new_files/*; do
              filename=$(basename "$file")
              if [ ! -f "old_files/$filename" ]; then
                CHANGED="true"
                echo "Новый файл: $filename"
              elif ! cmp -s "$file" "old_files/$filename"; then
                CHANGED="true"
                echo "Изменился: $filename"
              fi
            done
          else
            CHANGED="true"
            echo "Первый запуск, кэша нет"
          fi
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      # 4. Удаляем старые сообщения (гарантированно, через ID из файла)
      - name: Delete old messages
        if: steps.diff.outputs.changed == 'true' && hashFiles('message_ids.txt') != ''
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          echo "Удаляем старые сообщения по ID..."
          cat message_ids.txt | while read msg_id; do
            if [ -n "$msg_id" ]; then
              # Пробуем удалить, если ID есть в файле
              curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/deleteMessage" \
                -F "chat_id=${TG_CHAT_ID}" \
                -F "message_id=${msg_id}" || true
              echo "Удалено/пытался удалить: $msg_id"
            fi
          done
          rm -f message_ids.txt

      # 5. Отправляем ВСЕ новые файлы и сохраняем их ID
      - name: Send new files
        if: steps.diff.outputs.changed == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          for filepath in new_files/*; do
            if [ -f "$filepath" ]; then
              echo "Отправляем: $(basename $filepath)"
              RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
                -F "chat_id=${TG_CHAT_ID}" \
                -F "document=@$filepath")
              # Парсим ID нового сообщения
              MSG_ID=$(echo "$RESPONSE" | grep -o '"message_id":[0-9]*' | head -1 | cut -d':' -f2)
              if [ -n "$MSG_ID" ]; then
                echo "$MSG_ID" >> message_ids.txt
                echo "Отправлено, ID: $MSG_ID"
              fi
            fi
          done

      # 6. Обновляем кэш для следующего запуска
      - name: Update cache
        if: steps.diff.outputs.changed == 'true'
        run: |
          rm -rf old_files
          mv new_files old_files
