name: Download and send only changed configs

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Скачиваем свежие файлы
      - name: Download fresh files
        run: |
          mkdir -p new_files
          curl -L -o "new_files/WhiteListsRusMobile_MostHelpful.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
          curl -L -o "new_files/WhiteListsRusMobile2.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
          curl -L -o "new_files/WhiteCidrRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt"
          curl -L -o "new_files/WhiteCidrRUChecked.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-checked.txt"
          curl -L -o "new_files/WhiteSNIRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-SNI-RU-all.txt"

      # Вычисляем хеш новых файлов
      - name: Calculate hash
        id: hash
        run: |
          HASH=$(cat new_files/* | md5sum | cut -d' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "Хеш: $HASH"

      # Восстанавливаем кэш по хешу (если есть)
      - name: Restore cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            old_files
            message_ids.txt
          key: configs-${{ steps.hash.outputs.hash }}

      # Сравниваем (если кэш найден — файлы не менялись)
      - name: Check if changed
        id: diff
        run: |
          if [ "${{ steps.cache.outputs.cache-hit }}" == "true" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Файлы не изменились (кэш совпадает)"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Файлы ИЗМЕНИЛИСЬ!"
          fi

      # Удаляем старые сообщения
      - name: Delete old messages
        if: steps.diff.outputs.changed == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          if [ -f "message_ids.txt" ]; then
            while IFS= read -r msg_id; do
              if [ -n "$msg_id" ]; then
                curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/deleteMessage" \
                  -F "chat_id=${TG_CHAT_ID}" \
                  -F "message_id=${msg_id}" || true
                echo "Удалено: $msg_id"
              fi
            done < message_ids.txt
          else
            echo "Нет старых ID сообщений"
          fi

      # Отправляем новые файлы
      - name: Send new files
        if: steps.diff.outputs.changed == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          rm -f message_ids.txt
          for filepath in new_files/*; do
            if [ -f "$filepath" ]; then
              RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
                -F "chat_id=${TG_CHAT_ID}" \
                -F "document=@$filepath")
              MSG_ID=$(echo "$RESPONSE" | grep -o '"message_id":[0-9]*' | head -1 | cut -d':' -f2)
              if [ -n "$MSG_ID" ]; then
                echo "$MSG_ID" >> message_ids.txt
                echo "Отправлено, ID: $MSG_ID"
              fi
            fi
          done

      # Сохраняем кэш с новыми файлами (автоматически, после успешного выполнения)
      - name: Save new files for next run
        if: steps.diff.outputs.changed == 'true'
        run: |
          rm -rf old_files
          mv new_files old_files
