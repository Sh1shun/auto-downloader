name: Download all files and send as album to Telegram

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Download all files
        run: |
          curl -L -o "1.txt" "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
          curl -L -o "2.txt" "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
          curl -L -o "3.txt" "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt"
          curl -L -o "4.txt" "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-checked.txt"
          curl -L -o "5.txt" "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-SNI-RU-all.txt"
      
      - name: Send as album (media group)
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # Создаем JSON для медиагруппы из 5 файлов
          cat > payload.json << 'EOF'
          {
            "chat_id": "${TG_CHAT_ID}",
            "media": [
              {"type": "document", "media": "attach://1", "caption": ""},
              {"type": "document", "media": "attach://2", "caption": ""},
              {"type": "document", "media": "attach://3", "caption": ""},
              {"type": "document", "media": "attach://4", "caption": ""},
              {"type": "document", "media": "attach://5", "caption": ""}
            ]
          }
          EOF
          
          # Подставляем chat_id в JSON
          sed -i "s/\${TG_CHAT_ID}/${TG_CHAT_ID}/g" payload.json
          
          # Отправляем все 5 файлов одним альбомом
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMediaGroup" \
            -F "payload=@payload.json" \
            -F "1=@1.txt" \
            -F "2=@2.txt" \
            -F "3=@3.txt" \
            -F "4=@4.txt" \
            -F "5=@5.txt"
