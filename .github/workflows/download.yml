name: Download and send only changed configs

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # Скачиваем свежие файлы
      - name: Download fresh files
        run: |
          mkdir -p new_files
          curl -L -o "new_files/WhiteListsRusMobile_MostHelpful.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
          curl -L -o "new_files/WhiteListsRusMobile2.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
          curl -L -o "new_files/WhiteCidrRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt"
          curl -L -o "new_files/WhiteCidrRUChecked.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-checked.txt"
          curl -L -o "new_files/WhiteSNIRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-SNI-RU-all.txt"

      # Вычисляем хеш новых файлов
      - name: Calculate new hash
        id: hash
        run: |
          HASH=$(cat new_files/* | md5sum | cut -d' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "NEW_HASH=$HASH" >> $GITHUB_ENV

      # Читаем старый хеш из файла
      - name: Read old hash
        id: old
        run: |
          if [ -f "last_hash.txt" ]; then
            OLD_HASH=$(cat last_hash.txt)
            echo "hash=$OLD_HASH" >> $GITHUB_OUTPUT
            echo "Старый хеш: $OLD_HASH"
          else
            echo "hash=" >> $GITHUB_OUTPUT
            echo "Старый хеш не найден"
          fi

      # Сравниваем хеши и решаем, нужно ли обновлять
      - name: Check for changes
        id: diff
        run: |
          if [ "${{ steps.hash.outputs.hash }}" != "${{ steps.old.outputs.hash }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Файлы ИЗМЕНИЛИСЬ! Публикуем..."
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏸️ Файлы не изменились. Завершаем работу."
          fi

      # Если нет изменений — выходим
      - name: No changes, exit
        if: steps.diff.outputs.changed == 'false'
        run: |
          echo "Изменений нет, завершаем"
          exit 0

      # Удаляем ВСЕ старые сообщения из канала
      - name: Delete all old messages
        if: steps.diff.outputs.changed == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          echo "Удаляем старые сообщения..."
          for i in {1..50}; do
            RESPONSE=$(curl -s "https://api.telegram.org/bot${TG_BOT_TOKEN}/getUpdates?chat_id=${TG_CHAT_ID}&limit=1")
            MSG_ID=$(echo "$RESPONSE" | grep -o '"message_id":[0-9]*' | head -1 | cut -d':' -f2)
            if [ -n "$MSG_ID" ]; then
              curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/deleteMessage" \
                -F "chat_id=${TG_CHAT_ID}" \
                -F "message_id=${MSG_ID}" > /dev/null
              echo "Удалено: $MSG_ID"
            else
              break
            fi
          done

      # Отправляем новые файлы
      - name: Send new files
        if: steps.diff.outputs.changed == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          echo "Отправляем новые файлы..."
          for filepath in new_files/*; do
            if [ -f "$filepath" ]; then
              echo "Отправляем: $(basename $filepath)"
              curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
                -F "chat_id=${TG_CHAT_ID}" \
                -F "document=@$filepath"
            fi
          done

      # Сохраняем новый хеш в репозиторий
      - name: Save new hash
        if: steps.diff.outputs.changed == 'true'
        run: |
          echo "${{ steps.hash.outputs.hash }}" > last_hash.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_hash.txt
          git commit -m "Update hash [skip ci]" || echo "Nothing to commit"
          git pull origin main --rebase --strategy-option=theirs || true
          git push
