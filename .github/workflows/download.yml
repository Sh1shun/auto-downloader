name: Download file from GitHub and send to Telegram

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Download file
        run: curl -L -o vlesscfg.txt "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
      
      - name: Send to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TG_CHAT_ID}" \
            -F "document=@vlesscfg.txt" \
            -F "caption=File updated at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
