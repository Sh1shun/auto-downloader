name: Download and send only changed configs

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Скачиваем свежие файлы
      - name: Download fresh files
        run: |
          mkdir -p new_files
          curl -L -o "new_files/WhiteListsRusMobile_MostHelpful.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
          curl -L -o "new_files/WhiteListsRusMobile2.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
          curl -L -o "new_files/WhiteCidrRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt"
          curl -L -o "new_files/WhiteCidrRUChecked.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-checked.txt"
          curl -L -o "new_files/WhiteSNIRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-SNI-RU-all.txt"

      # Вычисляем хеш новых файлов
      - name: Calculate hash
        id: hash
        run: |
          HASH=$(cat new_files/* | md5sum | cut -d' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "Новый хеш: $HASH"

      # Восстанавливаем старый хеш и ID сообщений из отдельного кэша
      - name: Restore old state
        id: state
        uses: actions/cache@v4
        with:
          path: |
            old_hash.txt
            message_ids.txt
          key: configs-state

      # Загружаем старые файлы для сравнения (если есть)
      - name: Restore old files
        id: files
        uses: actions/cache@v4
        with:
          path: old_files
          key: configs-files-${{ steps.state.outputs.cache-hit == 'true' && hashFiles('old_hash.txt') || 'initial' }}

      # Сравниваем хеши
      - name: Check for changes
        id: diff
        run: |
          CHANGED="false"
          if [ -f "old_hash.txt" ]; then
            OLD_HASH=$(cat old_hash.txt)
            NEW_HASH="${{ steps.hash.outputs.hash }}"
            if [ "$OLD_HASH" != "$NEW_HASH" ]; then
              CHANGED="true"
              echo "Хеш изменился: $OLD_HASH -> $NEW_HASH"
            else
              echo "Хеш не изменился"
            fi
          else
            CHANGED="true"
            echo "Первый запуск, хеша нет"
          fi
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      # Удаляем старые сообщения
      - name: Delete old messages
        if: steps.diff.outputs.changed == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          if [ -f "message_ids.txt" ]; then
            echo "Найдены ID старых сообщений:"
            cat message_ids.txt
            while IFS= read -r msg_id; do
              if [ -n "$msg_id" ]; then
                curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/deleteMessage" \
                  -F "chat_id=${TG_CHAT_ID}" \
                  -F "message_id=${msg_id}" || true
                echo "Удалено: $msg_id"
              fi
            done < message_ids.txt
          else
            echo "Нет сохранённых ID сообщений (первый запуск или кэш пуст)"
          fi

      # Отправляем новые файлы
      - name: Send new files
        if: steps.diff.outputs.changed == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          rm -f new_msg_ids.txt
          for filepath in new_files/*; do
            if [ -f "$filepath" ]; then
              echo "Отправляем: $(basename $filepath)"
              RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
                -F "chat_id=${TG_CHAT_ID}" \
                -F "document=@$filepath")
              MSG_ID=$(echo "$RESPONSE" | grep -o '"message_id":[0-9]*' | head -1 | cut -d':' -f2)
              if [ -n "$MSG_ID" ]; then
                echo "$MSG_ID" >> new_msg_ids.txt
                echo "Отправлено, ID: $MSG_ID"
              else
                echo "Ошибка при отправке $(basename $filepath)"
                echo "Ответ API: $RESPONSE"
              fi
            fi
          done

      # Сохраняем новый хеш и ID сообщений
      - name: Save new state
        if: steps.diff.outputs.changed == 'true'
        run: |
          echo "${{ steps.hash.outputs.hash }}" > old_hash.txt
          if [ -f new_msg_ids.txt ]; then
            mv new_msg_ids.txt message_ids.txt
          fi
          # Сохраняем новые файлы для следующего сравнения
          rm -rf old_files
          mv new_files old_files

      # Обновляем кэш состояния
      - name: Update state cache
        if: steps.diff.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: |
            old_hash.txt
            message_ids.txt
          key: configs-state

      # Обновляем кэш файлов
      - name: Update files cache
        if: steps.diff.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: old_files
          key: configs-files-${{ steps.hash.outputs.hash }}
