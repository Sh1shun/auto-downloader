name: Download and send only changed configs

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Скачиваем свежие файлы
      - name: Download fresh files
        run: |
          mkdir -p new_files
          curl -L -o "new_files/WhiteListsRusMobile_MostHelpful.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
          curl -L -o "new_files/WhiteListsRusMobile2.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
          curl -L -o "new_files/WhiteCidrRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt"
          curl -L -o "new_files/WhiteCidrRUChecked.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-checked.txt"
          curl -L -o "new_files/WhiteSNIRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-SNI-RU-all.txt"

      # Создаём хеш новых файлов
      - name: Generate new hash
        run: |
          find new_files -type f -exec md5sum {} \; | sort > new_hash.txt

      # Загружаем старый хеш из репозитория (если есть)
      - name: Download old hash
        run: |
          if curl -s -f -o old_hash.txt "https://raw.githubusercontent.com/Sh1shun/auto-downloader/main/hash.txt"; then
            echo "Старый хеш загружен"
          else
            echo "Старый хеш не найден, это первый запуск"
            touch old_hash.txt
          fi

      # Сравниваем хеши
      - name: Check for changes
        id: diff
        run: |
          if cmp -s new_hash.txt old_hash.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Файлы не изменились"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Файлы ИЗМЕНИЛИСЬ!"
          fi

      # Удаляем старые сообщения (если есть)
      - name: Delete old messages
        if: steps.diff.outputs.changed == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          if curl -s -f -o msg_ids.txt "https://raw.githubusercontent.com/Sh1shun/auto-downloader/main/message_ids.txt"; then
            echo "Загружены ID сообщений"
            while IFS= read -r msg_id; do
              if [ -n "$msg_id" ]; then
                curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/deleteMessage" \
                  -F "chat_id=${TG_CHAT_ID}" \
                  -F "message_id=${msg_id}" || true
                echo "Удалено: $msg_id"
              fi
            done < msg_ids.txt
          else
            echo "Нет сохранённых ID сообщений"
          fi

      # Отправляем ВСЕ новые файлы
      - name: Send all files
        if: steps.diff.outputs.changed == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          rm -f new_msg_ids.txt
          for filepath in new_files/*; do
            if [ -f "$filepath" ]; then
              RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
                -F "chat_id=${TG_CHAT_ID}" \
                -F "document=@$filepath")
              MSG_ID=$(echo "$RESPONSE" | grep -o '"message_id":[0-9]*' | head -1 | cut -d':' -f2)
              if [ -n "$MSG_ID" ]; then
                echo "$MSG_ID" >> new_msg_ids.txt
              fi
            fi
          done

      # Сохраняем новый хеш и ID сообщений в репозиторий
      - name: Save hash and message IDs to repo
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          cp new_hash.txt hash.txt
          if [ -f new_msg_ids.txt ]; then
            cp new_msg_ids.txt message_ids.txt
          fi
          
          git add hash.txt message_ids.txt
          git commit -m "Update configs hash and message IDs [skip ci]" || echo "Nothing to commit"
          git push
