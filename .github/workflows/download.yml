name: Download file from GitHub and send to Telegram

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Download file
        run: curl -L -o myfile.txt "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
      
      - name: Send to Telegram
        env:
          # 👇 Собираем URL полностью в переменную окружения
          TELEGRAM_URL: "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument"
        run: |
          # 👇 Используем переменную из окружения
          curl -s -X POST "$TELEGRAM_URL" \
            -F "chat_id=${{ secrets.CHAT_ID }}" \
            -F "document=@myfile.txt" \
            -F "caption=Файл обновлен в $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
