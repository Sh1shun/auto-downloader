name: Download and send only changed configs with cleanup

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Восстанавливаем кэш с ID сообщений
      - name: Restore message IDs
        uses: actions/cache@v4
        id: cache
        with:
          path: message_ids.txt
          key: msg-ids-cache

      # ДИАГНОСТИКА: показываем, что в кэше
      - name: Debug cache content
        run: |
          if [ -f "message_ids.txt" ]; then
            echo "✅ message_ids.txt найден!"
            echo "Содержимое:"
            cat message_ids.txt
          else
            echo "❌ message_ids.txt НЕ найден (кэш пуст или первый запуск)"
          fi

      # Скачиваем файлы
      - name: Download files
        run: |
          curl -L -o "WhiteListsRusMobile(MostHelpful).txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
          curl -L -o "WhiteListsRusMobile2.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
          curl -L -o "WhiteCidrRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt"
          curl -L -o "WhiteCidrRUChecked.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-checked.txt"
          curl -L -o "WhiteSNIRUAll.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-SNI-RU-all.txt"

      # УДАЛЯЕМ старые сообщения с подробным логом
      - name: Delete old messages
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          if [ -f "message_ids.txt" ]; then
            echo "📤 Начинаем удаление старых сообщений..."
            while IFS= read -r msg_id; do
              if [ -n "$msg_id" ]; then
                echo "Пытаюсь удалить сообщение $msg_id"
                RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/deleteMessage" \
                  -F "chat_id=${TG_CHAT_ID}" \
                  -F "message_id=${msg_id}")
                echo "Ответ API: $RESPONSE"
                if echo "$RESPONSE" | grep -q '"ok":true'; then
                  echo "✅ Сообщение $msg_id удалено!"
                else
                  echo "❌ Не удалось удалить $msg_id"
                fi
              fi
            done < message_ids.txt
          else
            echo "📭 message_ids.txt не найден — нечего удалять (первый запуск?)"
          fi

      # Отправляем ВСЕ файлы и сохраняем ID
      - name: Send all files and save message IDs
        env:
          TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # Очищаем старый файл
          rm -f message_ids.txt
          
          for file in WhiteListsRusMobile\(MostHelpful\).txt WhiteListsRusMobile2.txt WhiteCidrRUAll.txt WhiteCidrRUChecked.txt WhiteSNIRUAll.txt; do
            if [ -f "$file" ]; then
              echo "📤 Отправляем: $file"
              RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
                -F "chat_id=${TG_CHAT_ID}" \
                -F "document=@$file")
              
              echo "Ответ: $RESPONSE"
              MSG_ID=$(echo "$RESPONSE" | grep -o '"message_id":[0-9]*' | head -1 | cut -d':' -f2)
              if [ -n "$MSG_ID" ]; then
                echo "$MSG_ID" >> message_ids.txt
                echo "✅ Отправлено, ID: $MSG_ID"
              else
                echo "❌ Ошибка при отправке $file"
              fi
            fi
          done
          
          echo "📝 Сохранено ID: $(cat message_ids.txt 2>/dev/null | wc -l) шт."

      # Сохраняем кэш
      - name: Save message IDs to cache
        uses: actions/cache@v4
        with:
          path: message_ids.txt
          key: msg-ids-cache
